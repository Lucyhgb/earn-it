<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>赚了么：学生党预算计算</title>
  <style>
    :root {
      --primary: #8B9A8E;
      --primary-light: #A8B5AC;
      --primary-dark: #6B7A6E;
      --positive: #7D9B8A;
      --negative: #C4908A;
      --bg: #F5F3F0;
      --card-bg: #FEFCF9;
      --text: #4A4A48;
      --text-light: #8A8A88;
      --border: #E5E2DD;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 0 12px;
      padding-bottom: 250px;
    }

    .header {
      background: linear-gradient(145deg, #E8E4DE 0%, #D8D4CE 100%);
      color: var(--text);
      padding: 12px 14px;
      height: auto;
      border-radius: 0 0 12px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      max-width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .header .container {
      max-width: 100%;
      margin: 0;
      padding: 0;
      padding-bottom: 0;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary-dark);
    }

    .preset-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .preset-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(107,122,110,0.15);
      color: var(--primary-dark);
    }

    .preset-btn:hover, .preset-btn.active { background: var(--primary-dark); color: white; }

    .section {
      background: var(--card-bg);
      border-radius: var(--radius);
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-header {
      padding: 9px 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      border-left: 3px solid var(--primary);
    }

    .section-header:hover { background: rgba(139,154,142,0.06); }

    .section-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 12px;
    }

    .section-icon { font-size: 14px; }

    .section-summary { display: flex; align-items: center; gap: 5px; }

    .section-daily {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 6px;
      background: var(--bg);
    }

    .section-daily.positive { color: var(--positive); background: rgba(125,155,138,0.12); }
    .section-daily.negative { color: var(--negative); background: rgba(196,144,138,0.12); }

    .section-toggle {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s;
      color: var(--text-light);
      font-size: 9px;
    }

    .section.expanded .section-toggle { transform: rotate(180deg); }

    .section-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .section.expanded .section-content { max-height: 4000px; }

    .section-inner { padding: 0 11px 11px; }

    .identity-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }

    .identity-tag {
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 10px;
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 3px;
      background: var(--bg);
    }

    .identity-tag.active { border-color: var(--primary); background: rgba(139,154,142,0.1); color: var(--primary-dark); }

    .form-group { margin-bottom: 8px; }

    .form-label { display: block; font-size: 9px; color: var(--text-light); margin-bottom: 3px; }

    .form-row { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }

    .form-input {
      flex: 1;
      min-width: 45px;
      padding: 7px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 11px;
      transition: border-color 0.2s;
      background: var(--bg);
    }

    .form-input:focus { outline: none; border-color: var(--primary); background: white; }
    .form-input::placeholder { color: #C5C2BC; }

    .form-select {
      padding: 7px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 11px;
      background: var(--bg);
      cursor: pointer;
      min-width: 55px;
    }

    .form-select:focus { outline: none; border-color: var(--primary); }

    .input-with-unit { display: flex; align-items: center; gap: 2px; flex: 1; min-width: 80px; }
    .input-with-unit .unit { font-size: 10px; color: var(--text-light); white-space: nowrap; }

    .input-row { display: flex; gap: 4px; align-items: center; }

    .checkbox-group { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }

    .checkbox-group input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--primary); cursor: pointer; }

    .checkbox-group label { font-size: 10px; cursor: pointer; display: flex; align-items: center; gap: 3px; }

    .subsection {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 8px;
      margin-bottom: 8px;
    }

    .subsection-title {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .collapsible-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-bottom: 5px;
    }

    .collapsible-header:hover { background: #ECEAE6; }
    .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .collapsible.open .collapsible-content { max-height: 2000px; }

    .dynamic-rows { display: flex; flex-direction: column; gap: 5px; }

    .dynamic-row {
      display: flex;
      gap: 3px;
      align-items: center;
      padding: 5px;
      background: white;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .dynamic-row .form-input { flex: 1; min-width: 45px; }
    .dynamic-row .form-select { min-width: 55px; flex-shrink: 0; }

    .delete-row {
      width: 22px;
      height: 22px;
      border: none;
      background: rgba(196,144,138,0.15);
      color: var(--negative);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }

    .delete-row:hover { background: rgba(196,144,138,0.25); }

    .add-row-btn {
      width: 100%;
      padding: 7px;
      border: 1.5px dashed var(--border);
      background: transparent;
      border-radius: var(--radius-sm);
      color: var(--primary);
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-top: 5px;
      transition: all 0.2s;
    }

    .add-row-btn:hover { border-color: var(--primary); background: rgba(139,154,142,0.05); }

    .chip-group { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }

    .chip {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 9px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      transition: all 0.2s;
      user-select: none;
    }

    .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

    .chip-panel { display: none; background: var(--bg); border-radius: var(--radius-sm); padding: 8px; margin-bottom: 8px; }
    .chip-panel.active { display: block; }

    .tag-cloud { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; }

    .tag {
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 9px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: white;
      transition: all 0.2s;
    }

    .tag:hover { border-color: var(--primary); }
    .tag.selected { background: var(--primary-light); color: white; border-color: var(--primary-light); }

    .tag-custom {
      border-style: dashed;
      border-width: 1.5px;
      color: var(--primary);
      background: rgba(139,154,142,0.08);
      font-weight: 500;
    }

    .tag-custom:hover { 
      background: rgba(139,154,142,0.18); 
      border-color: var(--primary);
    }

    .tag-category { font-size: 9px; color: var(--text-light); margin-bottom: 3px; margin-top: 5px; }
    .tag-category:first-child { margin-top: 0; }

    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
      z-index: 1000;
      padding: 10px 14px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    .footer-bar .container {
      max-width: 100%;
      margin: 0;
      padding: 0;
      padding-bottom: 0;
    }

    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

    .result-item { text-align: center; padding: 8px 6px; background: rgba(139,154,142,0.1); border-radius: var(--radius-sm); }
    .result-item.full { grid-column: span 2; }

    .result-label { font-size: 11px; color: var(--text-light); margin-bottom: 2px; }

    .result-value { font-size: 16px; font-weight: 700; font-family: "SF Mono", "Roboto Mono", monospace; }
    .result-value.positive { color: var(--positive); }
    .result-value.negative { color: var(--negative); }

    .result-hint { font-size: 10px; color: var(--text-light); margin-top: 2px; }

    .alert { padding: 6px 8px; border-radius: var(--radius-sm); font-size: 9px; margin-top: 6px; }

    .alert-info { background: rgba(139,154,142,0.1); color: var(--primary-dark); border-left: 3px solid var(--primary); }
    .alert-warning { background: rgba(196,144,138,0.1); color: var(--negative); border-left: 3px solid var(--negative); }

    .summary-line {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-top: 1px dashed var(--border);
      margin-top: 6px;
      font-weight: 600;
      font-size: 10px;
    }

    .summary-line .amount { color: var(--primary); }

    .reset-btn {
      display: block;
      width: 100%;
      padding: 9px;
      margin-top: 10px;
      border: none;
      background: var(--bg);
      color: var(--text-light);
      font-size: 10px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .reset-btn:hover { background: rgba(196,144,138,0.1); color: var(--negative); }

    .toggle-btn {
      font-size: 8px;
      color: var(--primary);
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 5px;
      background: rgba(139,154,142,0.1);
      border: none;
      white-space: nowrap;
    }

    .toggle-btn:hover { background: rgba(139,154,142,0.2); }

    .bus-trip-input { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
    .bus-trip-input .form-input { flex: 1; min-width: 40px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section { animation: fadeIn 0.4s ease backwards; }
    .section:nth-child(1) { animation-delay: 0.03s; }
    .section:nth-child(2) { animation-delay: 0.06s; }
    .section:nth-child(3) { animation-delay: 0.09s; }
    .section:nth-child(4) { animation-delay: 0.12s; }
    .section:nth-child(5) { animation-delay: 0.15s; }
    .section:nth-child(6) { animation-delay: 0.18s; }
    .section:nth-child(7) { animation-delay: 0.21s; }
    .section:nth-child(8) { animation-delay: 0.24s; }
    .section:nth-child(9) { animation-delay: 0.27s; }
    .section:nth-child(10) { animation-delay: 0.30s; }
  </style>
</head>
<body>

<header class="header" id="mainHeader">
  <div class="container">
    <h1>💰 赚了么：学生党预算计算</h1>
    <div class="preset-buttons">
      <button class="preset-btn" data-preset="out_of_town">异地实习</button>
      <button class="preset-btn" data-preset="local">本地实习</button>
      <button class="preset-btn" data-preset="none">清除</button>
    </div>
  </div>
</header>

<main class="container" id="main-content">
  <section class="section expanded" data-section="identity">
    <div class="section-header">
      <div class="section-title"><span class="section-icon">💰</span><span>收入来源</span></div>
      <div class="section-summary"><span class="section-daily positive" id="incomeDaily">¥0.0/天</span></div>
      <div class="section-toggle">▼</div>
    </div>
    <div class="section-content">
      <div class="section-inner">

          <div class="identity-tag" data-identity="parttime">兼职 🧾</div>
        </div>
        <div id="identityContent"></div>
      </div>
    </div>
  </section>

  <section class="section" data-section="meals">
    <div class="section-header">
      <div class="section-title"><span class="section-icon">🍽️</span><span>餐饮支出</span></div>
      <div class="section-summary"><span class="section-daily negative" id="mealsDaily">¥0.0/天</span></div>
      <div class="section-toggle">▼</div>

  <section class="section" data-section="commute">

      <div class="section-toggle">▼</div>
    </div>
    <div class="section-content">
      <div class="section-inner" id="commuteContent"></div>
    </div>
  </section>

  <section class="section" data-section="housing">
    <div class="section-header">
      <div class="section-title"><span class="section-icon">🏠</span><span>住房固定</span></div>
      <div class="section-summary"><span class="section-daily negative" id="housingDaily">¥0.0/天</span></div>
      <div class="section-toggle">▼</div>
    </div>
    <div class="section-content">
      <div class="section-inner" id="housingContent"></div>
    </div>
  </section>

  <section class="section" data-section="consumables">
    <div class="section-header">
      <div class="section-title"><span class="section-icon">🧴</span><span>消耗品</span></div>
      <div class="section-summary"><span class="section-daily negative" id="consumablesDaily">¥0.0/天</span></div>
      <div class="section-toggle">▼</div>
    </div>
    <div class="section-content">
      <div class="section-inner" id="consumablesContent"></div>
    </div>
  </section>

  <section class="section" data-section="membership">
    <div class="section-header">
      <div class="section-title"><span class="section-icon">💎</span><span>会员订阅</span></div>
      <div class="section-summary"><span class="section-daily negative" id="membershipDaily">¥0.0/天</span></div>
      <div class="section-toggle">▼</div>
    </div>
    <div class="section-content">
      <div class="section-inner" id="membershipContent"></div>
    </div>
  </section>

  <section class="section" data-section="entertainment">
    <div class="section-header">
      <div class="section-title"><span class="section-icon">📦</span><span>其他支出</span></div>
      <div class="section-summary"><span class="section-daily negative" id="entertainmentDaily">¥0.0/天</span></div>
      <div class="section-toggle">▼</div>
    </div>
    <div class="section-content">
      <div class="section-inner" id="entertainmentContent"></div>
    </div>
  </section>

  <section class="section" data-section="startup">
    <div class="section-header">
      <div class="section-title"><span class="section-icon">🚀</span><span>启动成本</span></div>
      <div class="section-summary"><span class="section-daily" id="startupDaily">¥0.0/天</span></div>
      <div class="section-toggle">▼</div>
    </div>
    <div class="section-content">
      <div class="section-inner" id="startupContent"></div>
    </div>
  </section>

  <section class="section" data-section="savings">
    <div class="section-header">
      <div class="section-title"><span class="section-icon">🎯</span><span>弹性储蓄目标</span></div>
      <div class="section-summary"><span class="section-daily" id="savingsDaily">¥0.0/天</span></div>
      <div class="section-toggle">▼</div>
    </div>
    <div class="section-content">
      <div class="section-inner" id="savingsContent"></div>
    </div>
  </section>

  <button class="reset-btn" id="resetBtn">🔄 重置所有数据</button>
</main>

<div class="footer-bar" id="mainFooter">
  <div class="container">
    <div class="result-grid">
      <div class="result-item">
        <div class="result-label">日均实际盈余</div>
        <div class="result-value positive" id="resultDaily">¥0.0</div>
      </div>
      <div class="result-item">
        <div class="result-label">月预估结余</div>
        <div class="result-value positive" id="resultMonthly">¥0.0</div>
      </div>
      <div class="result-item full" id="breakevenRow">
        <div class="result-label">回本天数</div>
        <div class="result-value" id="resultBreakeven">—</div>
        <div class="result-hint" id="breakevenHint"></div>
      </div>
    </div>
  </div>
</div>

let appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
let saveTimer = null;

function parseNum(val, fallback = 0) {
  const n = parseFloat(val);
  return isNaN(n) || n < 0 ? fallback : n;
}

function formatMoney(num) { return '¥' + num.toFixed(1); }

function getFreqDiv(freq) {
  const map = { daily: 1, weekly: 7, biweekly: 14, monthly: 30, semester: 120, once: 0 };
  return map[freq] || 1;
}

function getCycleDiv(cycle) {
  const map = { monthly: 30, quarterly: 90, yearly: 365 };
  return map[cycle] || 30;
}

function debounce(fn, delay = 300) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(fn, delay);
}

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      appData = deepMerge(JSON.parse(JSON.stringify(DEFAULT_DATA)), JSON.parse(saved));
    }
  } catch (e) { console.warn('Load failed:', e); }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch (e) { console.warn('Save failed:', e); }
}

function deepMerge(target, source) {
  for (const key in source) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
      target[key] = deepMerge(target[key] || {}, source[key]);
    } else {
      target[key] = source[key];
    }
  }
  return target;
}

function calcDailyIncome() {
  let daily = 0;
  const inc = appData.income;

  if (appData.identity.internship) {
    const { salaryType, salary, workDaysPerWeek, hoursPerDay } = inc.internship;
    if (salaryType === 'monthly') {
      daily += parseNum(salary) / 30;
    } else if (salaryType === 'daily') {
      const daysPerMonth = (parseNum(workDaysPerWeek) * 52) / 12;
      daily += parseNum(salary) * daysPerMonth / 30;
    } else if (salaryType === 'hourly') {
      const hoursPerMonth = parseNum(hoursPerDay) * parseNum(workDaysPerWeek) * 52 / 12;
      daily += parseNum(salary) * hoursPerMonth / 30;
    }
  }

  if (appData.identity.graduate) {
    const g = inc.graduate;
    daily += (parseNum(g.grant) * parseNum(g.grantMonths)) / 365;
    daily += (parseNum(g.labSubsidy) * parseNum(g.labMonths)) / 365;
    daily += (parseNum(g.taSubsidy) * parseNum(g.taMonths)) / 365;
    daily += (parseNum(g.mentorBonus) * parseNum(g.mentorMonths)) / 365;
    daily += (parseNum(g.projectIncome) * parseNum(g.projectMonths)) / 365;
    daily += parseNum(g.awardYearly) / 365;
  }

  if (appData.identity.family) {
    daily += parseNum(inc.family.amount) / getFreqDiv(inc.family.frequency);
  }

  if (appData.identity.parttime) {
    inc.parttimeJobs.forEach(job => {
      if (job.frequency === 'once') {
        daily += parseNum(job.amount) / parseNum(job.intervalDays || 30);
      } else {
        daily += parseNum(job.amount) / getFreqDiv(job.frequency);
      }
    });
  }

  return daily;
}

function calcMealSubsidyIncome() {
  if (!appData.identity.internship) return 0;
  const ms = appData.income.internship.mealSubsidy;
  if (!ms.enabled) return 0;
  let monthly = 0;
  if (ms.coversLunch) monthly += parseNum(ms.perMeal) * 22;
  if (ms.coversDinner) monthly += parseNum(ms.perMeal) * 22;
  const effective = monthly * (1 - parseNum(ms.wastePercent) / 100);
  return effective / 30;
}

function calcTransportSubsidyIncome() {
  if (!appData.identity.internship) return 0;
  const ts = appData.income.internship.transportSubsidy;
  if (ts.type === 'monthly') return parseNum(ts.amount) / 30;
  if (ts.type === 'daily') return parseNum(ts.amount);
  return 0;
}

function calcMealsExpense() {
  let daily = 0;
  const meals = appData.expense.meals;

  const calcMeal = (m) => {
    if (m.detailed.length === 0) {
      daily += parseNum(m.simple);
    }
    m.detailed.forEach(item => {
      if (item.type === 'perTrip') {
        daily += (parseNum(item.price) * parseNum(item.weeklyTimes)) / 7;
      } else if (item.type === 'stockpile') {
        const weeklyUse = parseNum(item.weeklyTimes || 0) * parseNum(item.itemsPerUse || 1);
        const totalUsePerDay = weeklyUse / 7;
        const pricePerItem = parseNum(item.totalPrice) / parseNum(item.totalQuantity) || 0;
        daily += totalUsePerDay * pricePerItem;
      }
    });
  };

  calcMeal(meals.breakfast);
  calcMeal(meals.lunch);
  calcMeal(meals.dinner);

  meals.extras.forEach(ex => {
    daily += parseNum(ex.amount) / getFreqDiv(ex.frequency);
  });

  return daily;
}

function calcCommuteExpense() {
  let daily = 0;
  const c = appData.expense.commute;
  const types = c.types || [];

  if (types.includes('walk')) {
    daily += parseNum(c.walk);
  }

  if (types.includes('bike')) {
    if (c.bike.type === 'monthly') daily += parseNum(c.bike.monthly) / 30;
    else if (c.bike.type === 'perTrip') daily += parseNum(c.bike.perTrip) * parseNum(c.bike.weekly || 0) / 7;
    else if (c.bike.type === 'purchase') daily += (parseNum(c.bike.purchase) / 365) + parseNum(c.bike.maintenance) / 30;
  }

  if (types.includes('ebike')) {
    const weeklyKm = parseNum(c.eBike.distance) * parseNum(c.eBike.trips) * parseNum(c.eBike.weeklyDays);
    const chargesPerWeek = weeklyKm / parseNum(c.eBike.range);
    const weeklyChargeCost = chargesPerWeek * parseNum(c.eBike.chargeCost);
    daily += weeklyChargeCost / 7;
    if (parseNum(c.eBike.purchase) > 0) daily += parseNum(c.eBike.purchase) / (365 * 3);
  }

  if (types.includes('bus')) {
    if (c.bus.type === 'monthly') daily += parseNum(c.bus.monthly) / 30;
    else if (c.bus.type === 'perTrip') {
      const goCost = parseNum(c.bus.goTrip?.price || 0) * parseNum(c.bus.goTrip?.weekly || 0);
      const returnCost = parseNum(c.bus.returnTrip?.price || 0) * parseNum(c.bus.returnTrip?.weekly || 0);
      daily += (goCost + returnCost) / 7;
    }
  }

  if (types.includes('taxi')) {
    const goCost = parseNum(c.taxi.goTrip?.price || 0) * parseNum(c.taxi.goTrip?.weekly || 0);
    const returnCost = parseNum(c.taxi.returnTrip?.price || 0) * parseNum(c.taxi.returnTrip?.weekly || 0);
    daily += (goCost + returnCost) / 7;
  }

  return daily;
}

function calcHousingExpense() {
  let daily = parseNum(appData.expense.housing.rent) / 30;
  const h = appData.expense.housing;
  daily += parseNum(h.utilities.electricity) / 30;
  daily += parseNum(h.utilities.water) / 30;
  daily += parseNum(h.utilities.gas) / 30;
  daily += parseNum(h.utilities.internet) / 30;
  daily += parseNum(h.management) / 30;
  if (h.ac.enabled) {
    daily += parseNum(h.ac.summer) / (30 * parseNum(h.ac.summerMonths || 3));
    daily += parseNum(h.ac.winter) / (30 * parseNum(h.ac.winterMonths || 3));
  }
  return daily;
}

function calcConsumablesExpense() {
  return appData.expense.consumables.reduce((sum, item) => {
    return sum + parseNum(item.price) / parseNum(item.days || 30);
  }, 0);
}

function calcMembershipsExpense() {
  return appData.expense.memberships.reduce((sum, m) => {
    const cycle = m.cycle || 'monthly';
    return sum + parseNum(m.price) / getCycleDiv(cycle);
  }, 0);
}

function calcEntertainmentExpense() {
  return appData.expense.entertainment.reduce((sum, ex) => {
    return sum + parseNum(ex.amount) / getFreqDiv(ex.frequency);
  }, 0);
}

function calcHealthExpense() {
  return parseNum(appData.expense.health) / 30;
}

function calcStartupDaily() {
  const s = appData.startup;
  if (!s.amortize || !parseNum(s.months)) return 0;
  const total = parseNum(s.oneTime.transport) + parseNum(s.oneTime.luggage) + parseNum(s.oneTime.deposit) + parseNum(s.oneTime.setup);
  return total / parseNum(s.months) / 30;
}

function calcSavingsDaily() {
  if (!appData.savings.enabled) return 0;
  return appData.savings.goals.reduce((sum, g) => {
    const target = parseNum(g.targetAmount);
    const months = parseNum(g.planMonths) || 1;
    return sum + target / months / 30;
  }, 0);
}

function recalculate() {
  const incomeDaily = calcDailyIncome() + calcMealSubsidyIncome() + calcTransportSubsidyIncome();
  const mealsDaily = calcMealsExpense();
  const commuteDaily = calcCommuteExpense();
  const housingDaily = calcHousingExpense();
  const consumablesDaily = calcConsumablesExpense();
  const membershipsDaily = calcMembershipsExpense();
  const entertainmentDaily = calcEntertainmentExpense();
  const healthDaily = calcHealthExpense();
  const startupDaily = calcStartupDaily();
  const savingsDaily = calcSavingsDaily();

  const expenseDaily = mealsDaily + commuteDaily + housingDaily + consumablesDaily + membershipsDaily + entertainmentDaily + healthDaily + startupDaily;
  const dailyNet = incomeDaily - expenseDaily;
  const monthlyNet = dailyNet * 30;

  const startupTotal = parseNum(appData.startup.oneTime.transport) + parseNum(appData.startup.oneTime.luggage) + parseNum(appData.startup.oneTime.deposit) + parseNum(appData.startup.oneTime.setup);

  document.getElementById('incomeDaily').textContent = formatMoney(incomeDaily) + '/天';
  document.getElementById('incomeDaily').className = 'section-daily ' + (incomeDaily >= 0 ? 'positive' : 'negative');

  document.getElementById('mealsDaily').textContent = formatMoney(mealsDaily) + '/天';
  document.getElementById('commuteDaily').textContent = formatMoney(commuteDaily) + '/天';
  document.getElementById('housingDaily').textContent = formatMoney(housingDaily) + '/天';
  document.getElementById('consumablesDaily').textContent = formatMoney(consumablesDaily) + '/天';
  document.getElementById('membershipDaily').textContent = formatMoney(membershipsDaily) + '/天';
  document.getElementById('entertainmentDaily').textContent = formatMoney(entertainmentDaily + healthDaily) + '/天';
  document.getElementById('startupDaily').textContent = formatMoney(startupDaily) + '/天';
  document.getElementById('savingsDaily').textContent = formatMoney(savingsDaily) + '/天';

  const dailyEl = document.getElementById('resultDaily');
  dailyEl.textContent = formatMoney(dailyNet);
  dailyEl.className = 'result-value ' + (dailyNet >= 0 ? 'positive' : 'negative');

  const monthlyEl = document.getElementById('resultMonthly');
  monthlyEl.textContent = formatMoney(monthlyNet);
  monthlyEl.className = 'result-value ' + (monthlyNet >= 0 ? 'positive' : 'negative');

  const breakevenEl = document.getElementById('resultBreakeven');
  const breakevenHint = document.getElementById('breakevenHint');
  const breakevenRow = document.getElementById('breakevenRow');

  if (startupTotal > 0 && appData.startup.amortize) {
    breakevenRow.style.display = 'none';
  } else if (startupTotal > 0 && dailyNet > 0) {
    const days = Math.ceil(startupTotal / dailyNet);
    breakevenEl.textContent = days + '天';
    breakevenEl.className = 'result-value positive';
    breakevenHint.textContent = `启动成本 ${formatMoney(startupTotal)}，约${Math.ceil(days / 30)}个月回本`;
    breakevenRow.style.display = 'block';
  } else if (startupTotal > 0) {
    breakevenEl.textContent = '无法回本';
    breakevenEl.className = 'result-value negative';
    breakevenHint.textContent = `月赤字 ${formatMoney(monthlyNet)}`;
    breakevenRow.style.display = 'block';
  } else {
    breakevenRow.style.display = 'none';
  }

  debounce(saveData);
}

function updateEbikeDisplay() {
  const eb = appData.expense.commute.eBike;
  const weeklyKm = parseNum(eb.distance) * parseNum(eb.trips) * parseNum(eb.weeklyDays);
  const chargesPerWeek = weeklyKm / (parseNum(eb.range) || 50);
  const weeklyChargeCost = chargesPerWeek * (parseNum(eb.chargeCost) || 0);
  const dailyCharge = weeklyChargeCost / 7;
  const dailyAmortize = parseNum(eb.purchase) / (365 * 3);
  const totalDaily = dailyCharge + dailyAmortize;
  const el = document.getElementById('ebikeDailyCost');
  if (el) el.textContent = formatMoney(totalDaily);
}

function bindGlobalEvents() {
  document.addEventListener('click', (e) => {
    const target = e.target;

    if (target.classList.contains('toggle-btn')) {
      const targetEl = document.getElementById(target.dataset.target);
      if (targetEl) targetEl.classList.toggle('open');
      return;
    }

    if (target.dataset.action === 'toggleCommute') {
      const type = target.dataset.type;
      const types = appData.expense.commute.types || [];
      const idx = types.indexOf(type);
      if (idx >= 0) {
        types.splice(idx, 1);
        target.classList.remove('active');
      } else {
        types.push(type);
        target.classList.add('active');
      }
      appData.expense.commute.types = types;
      renderCommuteContent();
      recalculate();
      return;
    }

    if (target.dataset.action === 'addMealDetail') {
      const item = target.dataset.item;
      appData.expense.meals[item].detailed.push({ type: 'perTrip', name: '', price: 0, weeklyTimes: '' });
      const simpleInput = document.getElementById('meal_' + item + '_simple');
      if (simpleInput) {
        simpleInput.value = '';
      }
      appData.expense.meals[item].simple = 0;
      renderMealDetailRows(item + 'Rows', appData.expense.meals[item].detailed);
      recalculate();
      return;
    }

    if (target.dataset.action === 'deleteMealDetail') {
      const item = target.dataset.item;
      const idx = parseInt(target.dataset.idx);
      appData.expense.meals[item].detailed.splice(idx, 1);
      renderMealDetailRows(item + 'Rows', appData.expense.meals[item].detailed);
      recalculate();
      return;
    }

    if (target.id === 'addExtraBtn') {
      appData.expense.meals.extras.push({ name: '', amount: 0, frequency: 'weekly' });
      renderExtrasRows();
      return;
    }

    if (target.dataset.action === 'deleteExtra') {
      const idx = parseInt(target.dataset.idx);
      appData.expense.meals.extras.splice(idx, 1);
      renderExtrasRows();
      recalculate();
      return;
    }

    if (target.id === 'addParttimeBtn') {
      appData.income.parttimeJobs.push({ name: '', amount: 0, frequency: 'monthly', intervalDays: 30 });
      renderParttimeRows();
      return;
    }

    if (target.dataset.action === 'deleteParttime') {
      const idx = parseInt(target.dataset.idx);
      appData.income.parttimeJobs.splice(idx, 1);
      renderParttimeRows();
      recalculate();
      return;
    }

    if (target.dataset.action === 'toggleConsumable') {
      const name = target.dataset.name;
      const existing = appData.expense.consumables.find(c => c.name === name);
      if (existing) {
        appData.expense.consumables = appData.expense.consumables.filter(c => c.name !== name);
        target.classList.remove('selected');
      } else {
        appData.expense.consumables.push({ name, price: 0, days: 30 });
        target.classList.add('selected');
      }
      renderConsumableRows();
      recalculate();
      return;
    }

    if (target.dataset.action === 'addCustomConsumable') {
      appData.expense.consumables.push({ name: '', price: 0, days: 30 });
      renderConsumableRows();
      return;
    }

    if (target.dataset.action === 'deleteConsumable') {
      const idx = parseInt(target.dataset.idx);
      const name = appData.expense.consumables[idx].name;
      appData.expense.consumables.splice(idx, 1);
      document.querySelectorAll('#consumablesContent .tag[data-name]').forEach(t => {
        if (t.dataset.name === name) t.classList.remove('selected');
      });
      renderConsumableRows();
      recalculate();
      return;
    }

    if (target.dataset.action === 'toggleMembership') {
      const id = target.dataset.id;
      const price = parseNum(target.dataset.price);
      const existing = appData.expense.memberships.find(m => m.id === id);
      if (existing) {
        appData.expense.memberships = appData.expense.memberships.filter(m => m.id !== id);
        target.classList.remove('selected');
      } else {
        appData.expense.memberships.push({ id, price, cycle: 'monthly' });
        target.classList.add('selected');
      }
      renderMembershipRows();
      recalculate();
      return;
    }

    if (target.dataset.action === 'addCustomMembership') {
      appData.expense.memberships.push({ id: '', price: 0, cycle: 'monthly' });
      renderMembershipRows();
      return;
    }

    if (target.dataset.action === 'deleteMembership') {
      const idx = parseInt(target.dataset.idx);
      const id = appData.expense.memberships[idx].id;
      appData.expense.memberships.splice(idx, 1);
      document.querySelectorAll('#membershipContent .tag[data-id]').forEach(t => {
        if (t.dataset.id === id) t.classList.remove('selected');
      });
      renderMembershipRows();
      recalculate();
      return;
    }

    if (target.id === 'addEntertainmentBtn') {
      appData.expense.entertainment.push({ name: '', amount: 0, frequency: 'monthly' });
      renderEntertainmentRows();
      return;
    }

    if (target.dataset.action === 'deleteEntertainment') {
      const idx = parseInt(target.dataset.idx);
      appData.expense.entertainment.splice(idx, 1);
      renderEntertainmentRows();
      recalculate();
      return;
    }

    if (target.id === 'addSavingsBtn') {
      appData.savings.goals.push({ name: '', targetAmount: 0, planMonths: 1 });
      renderSavingsRows();
      recalculate();
      return;
    }

    if (target.dataset.action === 'deleteSavings') {
      const idx = parseInt(target.dataset.idx);
      appData.savings.goals.splice(idx, 1);
      renderSavingsRows();
      recalculate();
      return;
    }
  });

  document.addEventListener('input', (e) => {
    const target = e.target;

    if (target.id === 'intern_salaryType') {
      appData.income.internship.salaryType = target.value;
      renderIdentityContent();
      recalculate();
      return;
    }

    if (target.id === 'intern_salary') { appData.income.internship.salary = parseNum(target.value); recalculate(); return; }
    if (target.id === 'intern_workDays') { appData.income.internship.workDaysPerWeek = parseNum(target.value); recalculate(); return; }
    if (target.id === 'intern_hoursDay') { appData.income.internship.hoursPerDay = parseNum(target.value); recalculate(); return; }
    if (target.id === 'mealSubsidy_enabled') { appData.income.internship.mealSubsidy.enabled = target.checked; document.getElementById('mealSubsidyFields').style.display = target.checked ? '' : 'none'; recalculate(); return; }
    if (target.id === 'mealSubsidy_perMeal') { appData.income.internship.mealSubsidy.perMeal = parseNum(target.value); recalculate(); return; }
    if (target.id === 'mealSubsidy_lunch') { appData.income.internship.mealSubsidy.coversLunch = target.checked; recalculate(); return; }
    if (target.id === 'mealSubsidy_dinner') { appData.income.internship.mealSubsidy.coversDinner = target.checked; recalculate(); return; }
    if (target.id === 'mealSubsidy_waste') { appData.income.internship.mealSubsidy.wastePercent = parseNum(target.value); recalculate(); return; }
    if (target.id === 'transportSubsidy_type') { appData.income.internship.transportSubsidy.type = target.value; recalculate(); return; }

function bindIdentityToggleEvents() {
  document.querySelectorAll('.identity-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const identity = tag.dataset.identity;
      appData.identity[identity] = !appData.identity[identity];
      tag.classList.toggle('active');
      renderIdentityContent();
      recalculate();
    });
  });
}

function bindSectionToggleEvents() {
  document.querySelectorAll('.section-header').forEach(header => {
    header.addEventListener('click', (e) => {
      if (e.target.closest('.section-summary')) return;
      header.parentElement.classList.toggle('expanded');
    });
  });
}

function bindPresetEvents() {
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const presetId = btn.dataset.preset;
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      if (presetId === 'none') {
        appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        appData.preset = 'none';
      } else if (PRESETS[presetId]) {
        appData = deepMerge(JSON.parse(JSON.stringify(DEFAULT_DATA)), PRESETS[presetId]);
        appData.preset = presetId;
      }

      updateUI();
      saveData();
    });
  });
}

function updateUI() {
  document.querySelectorAll('.identity-tag').forEach(tag => {
    const identity = tag.dataset.identity;
    tag.classList.toggle('active', appData.identity[identity]);
  });

  if (appData.preset && appData.preset !== 'none') {
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.preset === appData.preset);
    });
  }

  renderIdentityContent();
  renderMealsContent();
  renderCommuteContent();
  renderHousingContent();
  renderConsumablesContent();
  renderMembershipContent();
  renderEntertainmentContent();
  renderStartupContent();
  renderSavingsContent();
  recalculate();
}

function init() {
  loadData();
  updateUI();
  bindGlobalEvents();
  bindIdentityToggleEvents();
  bindSectionToggleEvents();
  bindPresetEvents();

  document.getElementById('resetBtn')?.addEventListener('click', () => {
    if (confirm('确定要重置所有数据吗？')) {
      appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
      saveData();
      updateUI();
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
